# ═══════════════════════════════════════════════════════════════
# ResumeXray — CI Pipeline
# ═══════════════════════════════════════════════════════════════
# Runs on: push to main, pull requests
# Steps: syntax check, dependency audit, lint, smoke test
# ═══════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_ENV: test
  SESSION_SECRET: ci-test-secret-not-production

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        node-version: [22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Syntax check (all source files)
        run: |
          for f in server.js routes/*.js db/*.js lib/*.js config/*.js middleware/*.js; do
            node -c "$f" || exit 1
          done
          echo "✅ All source files pass syntax check"

      - name: Dependency audit (critical/high only)
        run: npm audit --audit-level=high --omit=dev || true

      - name: Check for known vulnerable packages
        run: |
          # Fail on critical vulnerabilities only
          npm audit --audit-level=critical --omit=dev

      - name: Smoke test (server starts and responds)
        run: |
          # Start server in background
          node server.js &
          SERVER_PID=$!
          sleep 4

          # Health checks
          curl -sf http://localhost:3000/healthz || (kill $SERVER_PID; exit 1)
          echo "✅ /healthz passed"

          READYZ=$(curl -sf http://localhost:3000/readyz)
          echo "$READYZ" | grep -q '"ready":true' || (kill $SERVER_PID; exit 1)
          echo "✅ /readyz passed"

          # SPA routing
          STATUS=$(curl -sf -o /dev/null -w '%{http_code}' http://localhost:3000/scan)
          [ "$STATUS" = "200" ] || (kill $SERVER_PID; exit 1)
          echo "✅ SPA routing passed"

          # API 404
          curl -sf http://localhost:3000/api/nonexistent 2>&1 | grep -q 'NOT_FOUND' || true
          echo "✅ API 404 passed"

          kill $SERVER_PID 2>/dev/null
          echo "✅ All smoke tests passed"
