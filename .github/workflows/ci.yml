# ═══════════════════════════════════════════════════════════════
# ResumeXray — CI Pipeline
# ═══════════════════════════════════════════════════════════════
# Runs on: push to main, pull requests
# Steps: syntax check, dependency audit, lint, smoke test
# ═══════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_ENV: test
  SESSION_SECRET: ci-test-secret-not-production

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        node-version: [22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build / syntax check
        run: npm run build

      - name: Dependency audit (critical/high only)
        run: npm audit --audit-level=high --omit=dev

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test
