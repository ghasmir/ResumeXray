<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - ResumeXray</title>
    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-card: #141820;
        --accent: #635bff;
        --text-main: #ffffff;
        --text-muted: #76767f;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        background: var(--bg-deep);
        color: var(--text-main);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
        text-align: center;
      }

      .offline-container {
        max-width: 400px;
      }

      .icon {
        font-size: 4rem;
        margin-bottom: 1.5rem;
        opacity: 0.8;
      }

      h1 {
        font-size: 1.75rem;
        font-weight: 600;
        margin-bottom: 0.75rem;
      }

      p {
        color: var(--text-muted);
        line-height: 1.6;
        margin-bottom: 1.5rem;
      }

      button {
        background: var(--accent);
        color: white;
        border: none;
        padding: 12px 28px;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition: opacity 0.2s;
      }

      button:hover {
        opacity: 0.9;
      }

      a {
        display: inline-block;
        margin-top: 1.5rem;
        color: var(--accent);
        text-decoration: none;
        font-weight: 500;
      }

      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="offline-container">
      <div class="icon">📡</div>
      <h1>You're Offline</h1>
      <p>
        Don't worry! Your previously scanned resumes are still available. Check your connection and
        try again.
      </p>
      <button onclick="window.location.reload()">Try Again</button>
      <p>
        <a href="/dashboard">View Saved Scans →</a>
      </p>
    </div>
  </body>
</html>
