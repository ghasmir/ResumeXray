# ═══════════════════════════════════════════════════════════════
# ResumeXray — logrotate configuration
# ═══════════════════════════════════════════════════════════════
# Install: sudo cp deploy/logrotate.conf /etc/logrotate.d/resumexray
#
# Rotates PM2 logs daily, keeps 14 days, compresses old logs.
# PM2 cluster mode writes to /home/deploy/.pm2/logs/ by default.
# ═══════════════════════════════════════════════════════════════

/home/deploy/.pm2/logs/resumexray-out*.log
/home/deploy/.pm2/logs/resumexray-error*.log
{
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    dateext
    dateformat -%Y%m%d
    maxsize 50M
}
